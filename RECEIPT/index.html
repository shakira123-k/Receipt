<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arizona Supplies Limited Uganda Generator  Calculator</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f1ea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .form-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Arizona Supplies Uganda Limited Generator Calculator</h2>
        <form action="receipt.html" method="POST">
            <div class="form-group">
                <label for="name">Customer Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Shakira Kagoya">
            </div>

            <div class="form-group">
                <label for="generator_kva">Generator Rating (kVA)</label>
                <select id="generator_kva" name="generator_kva" required>
                    <option value="" disabled selected>Select kVA Rating</option>
                    <option value="5">5 kVA Generator</option>
                    <option value="10">10 kVA Generator</option>
                    <option value="20">20 kVA Generator</option>
                    <option value="30">30 kVA Generator</option>
                    <option value="40">40 kVA Generator</option>
                    <option value="320">320 kVA Generator</option>
                    <option value="520">520 kVA Generator</option>
                    <option value="1200">1200 kVA Generator</option>
                </select>
            </div>

            <div class="form-group">
                <label for="generators">Generators Bought This Month</label>
                <input type="number" id="generators" name="generators" min="0" required placeholder="0">
            </div>

            <div class="form-group">
                <label for="total">Current Order Total ($)</label>
                <select id="total" name="total" required>
                    <option value="" disabled selected>Select Order Total</option>
                    <option value="127.00">$127.00</option>
                    <option value="134.00">$134.00</option>
                    <option value="289.00">$289.00</option>
                    <option value="378.00">$378.00</option>
                    <option value="396.00">$396.00</option>
                    <option value="1345.00">$1,345.00</option>
                    <option value="489.00">$489.00</option>
                </select>
            </div>

            <div class="form-group">
                <label for="discount_rate">Select Discount</label>
                <select id="discount_rate" name="discount_rate" required>
                    <option value="0">0% Discount (Bronze Tier)</option>
                    <option value="10">10% Discount (Silver Tier)</option>
                    <option value="15">15% Discount (Gold Tier)</option>
                    <option value="20">20% Discount (Platinum Tier)</option>
                </select>
            </div>

            <button type="submit">Calculate Discount</button>
        </form>
    </div>

</body>
</html>
